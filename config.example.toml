# Copiá este archivo a config.toml y completá tus valores.
# config.toml NUNCA se commitea (está en .gitignore).
# Se lee con tomllib (stdlib de Python 3.11+).
# Todo esto también se puede configurar desde la app (menú ⚙ Configuración).

[ai]
# --- Proveedor de IA (OpenAI-compatible) ---
api_key  = "tu-api-key-aca"
base_url = "https://opencode.ai/zen/go/v1"   # OpenCode Go: el /go/ va en el medio
model    = "glm-5.1"                          # modelo principal (orquestador)
worker_model = ""                             # opcional: modelo "obrero" (chico/barato)

# Otros proveedores compatibles (cambiá base_url + model):
#   OpenAI:        base_url = "https://api.openai.com/v1"
#   Anthropic:     base_url = "https://api.anthropic.com/v1/"
#   Google Gemini: base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
#   OpenRouter:    base_url = "https://openrouter.ai/api/v1"
#   Ollama local:  base_url = "http://localhost:11434/v1"   (api_key cualquier cosa)

[storage]
# Ruta del archivo SQLite. Todo (manuales, versiones, PDFs) vive acá.
db_path = "manuales.db"

[user]
# Responsable/autor y área por defecto (se usan en los Datos generales y el versionado).
name = ""
area = ""

[brand]
# Identidad que aparece en la PORTADA del PDF.
name    = "Mi Empresa"
tagline = ""
logo    = ""          # ruta a un PNG/JPG (opcional)
